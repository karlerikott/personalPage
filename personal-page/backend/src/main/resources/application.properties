spring.application.name=Personal Page Backend
server.port=${PORT:8080}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Actuator — only expose the health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# MyFitnessPal integration
mfp.username=${MFP_USERNAME:}
mfp.password=${MFP_PASSWORD:}
mfp.session.cookie=${MFP_SESSION_COOKIE:}

# Strava integration
strava.client.id=${STRAVA_CLIENT_ID:}
strava.client.secret=${STRAVA_CLIENT_SECRET:}
strava.refresh.token=${STRAVA_REFRESH_TOKEN:}
